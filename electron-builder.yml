appId: com.rewind.app
productName: Rewind
directories:
  output: dist
  buildResources: resources
files:
  - out/**
  - package.json
icon: resources/icon.icns
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  # Notarization intentionally off for local builds; set APPLE_ID etc. and
  # remove this to notarize for distribution.
  notarize: false
npmRebuild: false
